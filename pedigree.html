async function fetchRabbits(){
  var res=await fetch(SUPA_URL+'/rest/v1/rabbits?select=*&limit=500',{
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
  });
  return await res.json();
}

function fmt(dob){
  if(!dob||dob==='-'||dob==='') return '-';
  var s=String(dob).trim();
  if(/^[0-9]{5}$/.test(s)){var d=new Date(1899,11,30);d.setDate(d.getDate()+parseInt(s));return ('0'+(d.getMonth()+1)).slice(-2)+'/'+('0'+d.getDate()).slice(-2)+'/'+d.getFullYear();}
  if(s.indexOf(' 00:00:00')>0){var p=s.split(' ')[0].split('-');if(p.length===3)return p[1]+'/'+p[2]+'/'+p[0];}
  if(s.indexOf('T00:00:00')>0){var p=s.split('T')[0].split('-');if(p.length===3)return p[1]+'/'+p[2]+'/'+p[0];}
  return dob;
}

function cell(a,lbl,isB,gg){
  var bg=isB?'#EAF3FF':'#FFEAF2';
  var bc=isB?'#90BEF5':'#F5A0C0';
  var bl=isB?'#1565C0':'#E91E63';
  var sxc=isB?'#1565C0':'#E91E63';
  var sx=isB?'&#9794; BUCK':'&#9792; DOE';
  var pad=gg?'2pt 4pt':'4pt 5pt';
  var fsn=gg?'7pt':'8pt';
  var fsi=gg?'6pt':'6.5pt';
  var h='<div style="background:'+bg+';border:0.5pt solid '+bc+';border-left:2pt solid '+bl+';border-radius:2pt;padding:'+pad+'">';
  if(lbl) h+='<div style="font-size:5pt;color:#555;text-transform:uppercase;font-weight:bold;margin-bottom:1pt">'+lbl+'</div>';
  if(a){
    h+='<div style="display:flex;justify-content:space-between;align-items:baseline">';
    h+='<div style="font-size:'+fsn+';font-weight:bold;flex:1;line-height:1.2">'+a.name+'</div>';
    h+='<div style="font-size:'+fsi+';font-weight:bold;color:'+sxc+';white-space:nowrap;margin-left:2pt">'+sx+'</div></div>';
    h+='<div style="font-size:'+fsi+';color:#222;line-height:1.4;margin-top:1pt">';
    h+='<b>ID:</b> '+a.id+' &nbsp;<b>DOB:</b> '+fmt(a.dob)+'<br>';
    h+='<b>COLOR:</b> '+(a.color||'-')+' &nbsp;<b>BREED:</b> '+(a.breed||'-')+'<br>';
    h+='<b>WEIGHT:</b> '+(a.weight&&a.weight!=='-'?a.weight:'-')+' &nbsp;<b>LEGS:</b> '+(a.legs||'-');
    h+='</div>';
  } else {
    h+='<div style="font-size:'+fsi+';color:#bbb">'+(lbl?'&mdash;':'')+'</div>';
  }
  return h+'</div>';
}

function slot(content,pad){
  return '<div style="flex:1;display:flex;align-items:center;'+pad+'">'+content+'</div>';
}

function renderPedigree(db, id){
  var r=db.find(function(x){return x.id===id;})||db.find(function(x){return (x.id||'').toLowerCase()===id.toLowerCase();});
  if(!r){
    document.getElementById('loading').innerHTML='<div class="error">Rabbit not found: '+id+'</div>';
    return;
  }
  function getR(rid){
    if(!rid||rid===''||rid==='-') return null;
    return db.find(function(x){return x.id===rid;})||db.find(function(x){return (x.id||'').toLowerCase()===(rid||'').toLowerCase();})||null;
  }
  var iF=r.sex==='F';
  var mBg=iF?'#FFEAF2':'#1565C0';
  var mCl=iF?'#880E4F':'#fff';
  var mBd=iF?'2pt solid #E91E63':'none';
  var s=r.sire_id||'',d=r.dam_id||'';
  var sr=getR(s),dr=getR(d);
  var ss=sr?sr.sire_id||'':'',sd=sr?sr.dam_id||'':'';
  var ds=dr?dr.sire_id||'':'',dd=dr?dr.dam_id||'':'';
  var ssr=getR(ss),sdr=getR(sd),dsr=getR(ds),ddr=getR(dd);
  var sss=ssr?ssr.sire_id||'':'',ssd=ssr?ssr.dam_id||'':'';
  var sds=sdr?sdr.sire_id||'':'',sdd=sdr?sdr.dam_id||'':'';
  var dss=dsr?dsr.sire_id||'':'',dsd=dsr?dsr.dam_id||'':'';
  var dds=ddr?ddr.sire_id||'':'',ddd=ddr?ddr.dam_id||'':'';
  var today=new Date().toLocaleDateString('en-US');

  var isBSire=sr?sr.sex==='M':true;
  var isBDam=dr?dr.sex==='M':false;
  var bgS=isBSire?'#EAF3FF':'#FFEAF2',bcS=isBSire?'#90BEF5':'#F5A0C0',blS=isBSire?'#1565C0':'#E91E63',sxcS=isBSire?'#1565C0':'#E91E63',sxS=isBSire?'&#9794; BUCK':'&#9792; DOE';
  var bgD=isBDam?'#EAF3FF':'#FFEAF2',bcD=isBDam?'#90BEF5':'#F5A0C0',blD=isBDam?'#1565C0':'#E91E63',sxcD=isBDam?'#1565C0':'#E91E63',sxD=isBDam?'&#9794; BUCK':'&#9792; DOE';

  var h=[];
  // Header
  h.push('<div style="display:flex;align-items:center;justify-content:space-between;border-bottom:1.5pt solid #1565C0;padding-bottom:7pt;margin-bottom:5pt">');
  h.push('<img src="'+LOGO+'" width="55" height="55" style="object-fit:contain;flex-shrink:0">');
  h.push('<div style="text-align:center;flex:1"><div style="font-size:18pt;font-weight:bold;color:#1565C0;letter-spacing:0.5pt">S&amp;D RABBITRY</div>');
  h.push('<div style="font-size:8pt;color:#666">Quality &bull; Health &bull; Genetics</div>');
  h.push('<div style="font-size:7pt;color:#aaa">sdrabbitry.com</div></div>');
  h.push('<img src="'+LOGO+'" width="55" height="55" style="object-fit:contain;flex-shrink:0"></div>');
  h.push('<div style="background:#1565C0;height:3pt;border-radius:1pt;margin-bottom:5pt"></div>');

  // Pedigree
  h.push('<div style="display:flex;gap:3pt;height:calc(100vh - 160pt)">');

  // Col 1
  h.push('<div style="flex:13;display:flex;align-items:center;flex-shrink:0">');
  h.push('<div style="background:'+mBg+';color:'+mCl+';border:'+mBd+';border-radius:3pt;padding:5pt;width:100%">');
  h.push('<div style="font-size:5pt;font-weight:bold;text-transform:uppercase;opacity:.75;margin-bottom:1pt"></div>');
  h.push('<div style="font-size:10pt;font-weight:bold;margin-bottom:2pt">'+r.name+'</div>');
  h.push('<div style="font-size:7pt;font-weight:bold;margin-bottom:2pt;opacity:.9">'+(iF?'&#9792; DOE':'&#9794; BUCK')+'</div>');
  h.push('<div style="font-size:6pt;line-height:1.5;opacity:.9"><b>ID:</b> '+r.id+'<br><b>DOB:</b> '+fmt(r.dob)+'<br><b>COLOR:</b> '+(r.color||'-')+'<br><b>BREED:</b> '+(r.breed||'-')+'<br><b>WEIGHT:</b> '+(r.weight&&r.weight!=='-'?r.weight:'-')+'<br><b>LEGS:</b> '+(r.legs||'-')+'</div>');
  h.push('</div></div>');

  // Col 2
  h.push('<div style="flex:19;display:flex;flex-direction:column;flex-shrink:0">');
  h.push('<div style="flex:1;display:flex;align-items:center;padding-bottom:1.5pt">');
  h.push('<div style="background:'+bgS+';border:0.5pt solid '+bcS+';border-left:2pt solid '+blS+';border-radius:2pt;padding:4pt 5pt;width:100%">');
  h.push('<div style="font-size:5pt;color:#555;text-transform:uppercase;font-weight:bold;margin-bottom:2pt">Sire</div>');
  if(sr){h.push('<div style="display:flex;justify-content:space-between;align-items:baseline"><div style="font-size:8pt;font-weight:bold;flex:1">'+sr.name+'</div><div style="font-size:6.5pt;font-weight:bold;color:'+sxcS+';white-space:nowrap;margin-left:2pt">'+sxS+'</div></div><div style="font-size:6.5pt;color:#222;line-height:1.4;margin-top:1pt"><b>ID:</b> '+sr.id+' &nbsp;<b>DOB:</b> '+fmt(sr.dob)+'<br><b>COLOR:</b> '+(sr.color||'-')+' &nbsp;<b>BREED:</b> '+(sr.breed||'-')+'<br><b>WEIGHT:</b> '+(sr.weight&&sr.weight!=='-'?sr.weight:'-')+' &nbsp;<b>LEGS:</b> '+(sr.legs||'-')+'</div>');}
  else{h.push('<div style="font-size:6.5pt;color:#bbb">'+(s||'&mdash;')+'</div>');}
  h.push('</div></div>');
  h.push('<div style="flex:1;display:flex;align-items:center;padding-top:1.5pt">');
  h.push('<div style="background:'+bgD+';border:0.5pt solid '+bcD+';border-left:2pt solid '+blD+';border-radius:2pt;padding:4pt 5pt;width:100%">');
  h.push('<div style="font-size:5pt;color:#555;text-transform:uppercase;font-weight:bold;margin-bottom:2pt">Dam</div>');
  if(dr){h.push('<div style="display:flex;justify-content:space-between;align-items:baseline"><div style="font-size:8pt;font-weight:bold;flex:1">'+dr.name+'</div><div style="font-size:6.5pt;font-weight:bold;color:'+sxcD+';white-space:nowrap;margin-left:2pt">'+sxD+'</div></div><div style="font-size:6.5pt;color:#222;line-height:1.4;margin-top:1pt"><b>ID:</b> '+dr.id+' &nbsp;<b>DOB:</b> '+fmt(dr.dob)+'<br><b>COLOR:</b> '+(dr.color||'-')+' &nbsp;<b>BREED:</b> '+(dr.breed||'-')+'<br><b>WEIGHT:</b> '+(dr.weight&&dr.weight!=='-'?dr.weight:'-')+' &nbsp;<b>LEGS:</b> '+(dr.legs||'-')+'</div>');}
  else{h.push('<div style="font-size:6.5pt;color:#bbb">'+(d||'&mdash;')+'</div>');}
  h.push('</div></div></div>');

  // Col 3
  h.push('<div style="flex:26;display:flex;flex-direction:column;flex-shrink:0">');
  [[ss,'G-Sire/Sire',true],[sd,'G-Dam/Sire',false],[ds,'G-Sire/Dam',true],[dd,'G-Dam/Dam',false]].forEach(function(g,i){
    var a=getR(g[0]);var isB=a?a.sex==='M':g[2];
    var pad=i===0?'padding-bottom:1pt':i===3?'padding-top:1pt':'padding:1pt 0';
    h.push('<div style="flex:1;display:flex;align-items:center;'+pad+'">'+cell(a,g[1],isB,false)+'</div>');
  });
  h.push('</div>');

  // Col 4
  h.push('<div style="flex:42;display:flex;flex-direction:column;flex-shrink:0">');
  [[sss,true],[ssd,false],[sds,true],[sdd,false],[dss,true],[dsd,false],[dds,true],[ddd,false]].forEach(function(g,i){
    var a=getR(g[0]);var isB=a?a.sex==='M':g[1];
    var pad=i===0?'padding-bottom:1pt':i===7?'padding-top:1pt':'padding:1pt 0';
    h.push('<div style="flex:1;display:flex;align-items:center;'+pad+'">'+cell(a,'',isB,true)+'</div>');
  });
  h.push('</div>');
  h.push('</div>');

  // Footer
  h.push('<div style="border-top:0.5pt solid #ccc;margin-top:5pt;padding-top:4pt;display:flex;justify-content:space-between;font-size:6pt">');
  h.push('<div><i style="color:#555">I certify that this pedigree is correct to the best of my knowledge.</i><br><br><b>S&amp;D Rabbitry</b><br>45812 State Route 309, Alger, Ohio 45812</div>');
  h.push('<div style="text-align:right">Signed: ___________________________<br><br>Date: '+today+'</div></div>');

  document.getElementById('loading').style.display='none';
  document.getElementById('ped-wrap').innerHTML=h.join('');
  document.getElementById('ped-wrap').style.display='block';
  document.getElementById('btn-wrap').style.display='block';
  document.title='Pedigree - '+r.name;
}

  var params=new URLSearchParams(window.location.search);
  var id=params.get('rabbit');
  if(!id){document.getElementById('loading').innerHTML='<div class="error">No rabbit specified</div>';return;}
  try{
    var db=await fetchRabbits();
    renderPedigree(db,id);
  } catch(e){
    document.getElementById('loading').innerHTML='<div class="error">Error loading data: '+e.message+'</div>';
  }
};
</script>
</body></html>
